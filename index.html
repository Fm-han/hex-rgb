<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX/RGB/RGBA 颜色转换器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input[type="text"] { width: 100%; }
        input[type="number"] { width: 80px; }
        input[type="color"] { width: 100px; height: 40px; cursor: pointer; }
        .color-preview { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 16px; }
        .formats { display: grid; gap: 12px; }
        .format-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f5f5f5; border-radius: 4px; }
        .format-label { font-weight: 500; min-width: 60px; }
        .format-value { flex: 1; font-family: monospace; background: #fff; padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        .copy-btn { padding: 6px 12px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .copy-btn:hover { background: #0056b3; }
        .slider-group { display: flex; gap: 8px; align-items: center; }
        .slider-group input[type="range"] { flex: 1; }
        .slider-value { width: 50px; text-align: center; font-family: monospace; }
        .rgb-row { display: flex; gap: 16px; margin-bottom: 12px; }
        .rgb-input { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HEX/RGB/RGBA 颜色转换器</h1>
        <div class="card">
            <div class="color-preview" id="preview"></div>
            <div class="form-group">
                <label>选择颜色</label>
                <input type="color" id="colorPicker" value="#007bff" onchange="updateFromPicker()">
            </div>
            <div class="form-group">
                <label>HEX 值</label>
                <input type="text" id="hexInput" value="#007bff" onchange="updateFromHex()">
            </div>
            <div class="rgb-row">
                <div class="rgb-input form-group">
                    <label>R (0-255)</label>
                    <input type="number" id="rInput" value="0" min="0" max="255" onchange="updateFromRgb()">
                </div>
                <div class="rgb-input form-group">
                    <label>G (0-255)</label>
                    <input type="number" id="gInput" value="123" min="0" max="255" onchange="updateFromRgb()">
                </div>
                <div class="rgb-input form-group">
                    <label>B (0-255)</label>
                    <input type="number" id="bInput" value="255" min="0" max="255" onchange="updateFromRgb()">
                </div>
            </div>
            <div class="form-group">
                <label>Alpha (0-1)</label>
                <div class="slider-group">
                    <input type="range" id="alphaSlider" min="0" max="1" step="0.01" value="1" onchange="updateFromAlpha()">
                    <span class="slider-value" id="alphaValue">1</span>
                </div>
            </div>
        </div>
        <div class="card">
            <label>转换结果</label>
            <div class="formats">
                <div class="format-item">
                    <span class="format-label">HEX</span>
                    <span class="format-value" id="hexOut">#007bff</span>
                    <button class="copy-btn" onclick="copy('hexOut')">复制</button>
                </div>
                <div class="format-item">
                    <span class="format-label">RGB</span>
                    <span class="format-value" id="rgbOut">rgb(0, 123, 255)</span>
                    <button class="copy-btn" onclick="copy('rgbOut')">复制</button>
                </div>
                <div class="format-item">
                    <span class="format-label">RGBA</span>
                    <span class="format-value" id="rgbaOut">rgba(0, 123, 255, 1)</span>
                    <button class="copy-btn" onclick="copy('rgbaOut')">复制</button>
                </div>
                <div class="format-item">
                    <span class="format-label">HSL</span>
                    <span class="format-value" id="hslOut">hsl(211, 100%, 50%)</span>
                    <button class="copy-btn" onclick="copy('hslOut')">复制</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let r = 0, g = 123, b = 255, a = 1;
        
        function updateFromPicker() {
            const hex = document.getElementById('colorPicker').value;
            document.getElementById('hexInput').value = hex;
            hexToRgb(hex);
            updateAll();
        }
        
        function updateFromHex() {
            let hex = document.getElementById('hexInput').value;
            if (!hex.startsWith('#')) hex = '#' + hex;
            if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
            document.getElementById('colorPicker').value = hex;
            hexToRgb(hex);
            updateAll();
        }
        
        function updateFromRgb() {
            r = parseInt(document.getElementById('rInput').value) || 0;
            g = parseInt(document.getElementById('gInput').value) || 0;
            b = parseInt(document.getElementById('bInput').value) || 0;
            r = Math.max(0, Math.min(255, r));
            g = Math.max(0, Math.min(255, g));
            b = Math.max(0, Math.min(255, b));
            document.getElementById('rInput').value = r;
            document.getElementById('gInput').value = g;
            document.getElementById('bInput').value = b;
            document.getElementById('hexInput').value = rgbToHex(r, g, b);
            document.getElementById('colorPicker').value = rgbToHex(r, g, b);
            updateAll();
        }
        
        function updateFromAlpha() {
            a = parseFloat(document.getElementById('alphaSlider').value);
            document.getElementById('alphaValue').textContent = a.toFixed(2);
            updateAll();
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (result) {
                r = parseInt(result[1], 16);
                g = parseInt(result[2], 16);
                b = parseInt(result[3], 16);
                document.getElementById('rInput').value = r;
                document.getElementById('gInput').value = g;
                document.getElementById('bInput').value = b;
            }
        }
        
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }
        
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }
        
        function updateAll() {
            const hex = rgbToHex(r, g, b);
            document.getElementById('preview').style.backgroundColor = a < 1 ? `rgba(${r}, ${g}, ${b}, ${a})` : hex;
            document.getElementById('hexOut').textContent = hex;
            document.getElementById('rgbOut').textContent = `rgb(${r}, ${g}, ${b})`;
            document.getElementById('rgbaOut').textContent = `rgba(${r}, ${g}, ${b}, ${a})`;
            const hsl = rgbToHsl(r, g, b);
            document.getElementById('hslOut').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        }
        
        function copy(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text);
            const btn = event.target;
            const original = btn.textContent;
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = original, 1000);
        }
        
        updateAll();
    </script>
</body>
</html>
